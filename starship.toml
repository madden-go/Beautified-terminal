"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette     = "mocha"

format = """
[╭─](overlay0) $directory$git_branch$git_status$git_state$fill$cmd_duration
[╰─](overlay0) $python$nodejs$rust$golang$java$ruby$swift$kotlin$lua$zig$character"""

[palettes.mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f38ba8"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
format            = "[$path]($style)[$read_only](red) "
style             = "bold blue"
read_only         = " 󰌾"
truncation_length = 3
truncate_to_repo  = true
home_symbol       = "~"

[directory.substitutions]
"Documents"        = "docs"
"Downloads"        = "dl"
"Desktop/projects" = "proj"
"Desktop"          = "desk"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
format = "[·](overlay0)  [$branch](peach) "
style  = "peach"

[git_status]
format     = "([\\[](overlay0)[$all_status$ahead_behind](yellow)[\\]](overlay0) )"
style      = "yellow"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕"
conflicted = "≠"
untracked  = "?${count}"
stashed    = "≡"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[git_state]
format = "[·](overlay0) [$state( $progress_current/$progress_total)](green) "
style  = "green"

# ── Fill + duration ───────────────────────────────────────────────────────────
[fill]
symbol = " "

[cmd_duration]
format   = "[⏱ $duration](overlay1)"
min_time = 2_000

# ── Language runtimes ─────────────────────────────────────────────────────────
[python]
format            = "[py](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["py"]
detect_files      = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[nodejs]
format         = "[node](sky)[·](overlay0)[$version](subtext0) "
version_format = "${major}.${minor}"
detect_files   = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[rust]
format            = "[rs](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["rs"]
detect_files      = ["Cargo.toml"]

[golang]
format            = "[go](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["go"]
detect_files      = ["go.mod", "go.sum"]

[java]
format            = "[java](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}"
detect_extensions = ["java", "gradle", "kt"]
detect_files      = ["pom.xml", "build.gradle", "build.gradle.kts"]

[ruby]
format            = "[rb](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["rb"]
detect_files      = ["Gemfile", ".ruby-version"]

[swift]
format            = "[swift](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["swift"]

[kotlin]
format            = "[kt](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["kt", "kts"]

[lua]
format            = "[lua](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["lua"]
detect_files      = [".lua-version"]

[zig]
format            = "[zig](sky)[·](overlay0)[$version](subtext0) "
version_format    = "${major}.${minor}"
detect_extensions = ["zig"]

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold sky)"
